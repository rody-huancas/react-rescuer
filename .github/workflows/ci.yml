name: ci

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install

      - name: build
        run: pnpm --filter react-rescuer build

      - name: test
        run: pnpm --filter react-rescuer test
